version: v2
inputs:
  - directory: .
plugins:
  - local: protoc-gen-go
    out: ../../apps/api/gen
    opt: [paths=source_relative]
  - local: protoc-gen-connect-go
    out: ../../apps/api/gen
    opt: [paths=source_relative]
  - local: ../../apps/web/node_modules/.bin/protoc-gen-es
    out: ../../apps/web/lib/gen
    opt: [target=ts]
