# Lima VM configuration for Lab project
# Develop on Mac (M3 ARM64), run tests and dev server in Debian VM
#
# Usage:
#   ./scripts/setup-lima.sh             # One-time setup (recommended)
#   limactl start --name=lab lima.yaml  # Manual create + start
#   limactl shell lab                   # Shell into VM
#   limactl stop lab                    # Stop VM
#   limactl delete lab                  # Delete VM
#
# VS Code: Install "Remote - SSH" extension, then connect to "lima-lab"
# Project is mounted at /app inside the VM.

# Apple Virtualization Framework — native ARM64 performance on M3.
# Requires macOS 13+ (guaranteed on M3 which needs macOS 14+).
vmType: "vz"
rosetta:
  enabled: false

# Use host architecture (aarch64 on Apple Silicon) for native speed.
# x86_64 test coverage is handled by Docker with platform: linux/amd64.
arch: "host"

# Debian 12 Bookworm — matches Dockerfile base image
images:
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-arm64.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
    arch: "x86_64"

cpus: 4
memory: "8GiB"
disk: "60GiB"

# Writable 2-way virtiofs mount of the project directory.
# "." is resolved relative to CWD when running `limactl start`.
# The setup script ensures this is the repo root.
mounts:
  - location: "."
    mountPoint: "/app"
    writable: true
  # Home directory — read-only for SSH keys, git config, etc.
  - location: "~"
    writable: false
  # Writable temp
  - location: "/tmp/lima"
    writable: true

mountType: "virtiofs"

# Don't install containerd — we use Docker CE directly
containerd:
  system: false
  user: false

# Port forwarding for web (3000) and API (8080)
portForwards:
  - guestPort: 3000
    hostPort: 3000
  - guestPort: 8080
    hostPort: 8080

# Provision scripts run on every `limactl start` — must be idempotent.
provision:
  # ── System packages ──────────────────────────────────────────────
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update -qq
      apt-get install -y \
        curl wget gnupg ca-certificates apt-transport-https \
        build-essential pkg-config git \
        libvirt-dev libvirt-daemon-system libvirt-clients \
        qemu-system-x86 qemu-system-arm qemu-utils \
        qemu-user-static binfmt-support \
        protobuf-compiler \
        unzip

      # binfmt_misc is needed for Docker linux/amd64 containers on ARM64
      systemctl restart binfmt-support || true

  # ── Docker CE ────────────────────────────────────────────────────
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! command -v docker &>/dev/null; then
        curl -fsSL https://get.docker.com | sh
      fi
      systemctl enable --now docker

      # Grant the Lima user access to docker and libvirt
      PRIMARY_USER="$(getent passwd 1000 | cut -d: -f1)"
      usermod -aG docker "$PRIMARY_USER" 2>/dev/null || true
      usermod -aG libvirt "$PRIMARY_USER" 2>/dev/null || true

  # ── libvirtd ─────────────────────────────────────────────────────
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      systemctl enable --now libvirtd

  # ── Go 1.25 ──────────────────────────────────────────────────────
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      GO_VERSION="1.25.7"
      ARCH="$(uname -m)"
      case "$ARCH" in
        aarch64) GO_ARCH="arm64" ;;
        x86_64)  GO_ARCH="amd64" ;;
        *) echo "Unsupported arch: $ARCH"; exit 1 ;;
      esac

      # Only download if version differs (idempotent)
      INSTALLED="$(/usr/local/go/bin/go version 2>/dev/null | awk '{print $3}' || true)"
      if [ "$INSTALLED" != "go${GO_VERSION}" ]; then
        wget -q "https://go.dev/dl/go${GO_VERSION}.linux-${GO_ARCH}.tar.gz" -O /tmp/go.tar.gz
        rm -rf /usr/local/go
        tar -C /usr/local -xzf /tmp/go.tar.gz
        rm /tmp/go.tar.gz
      fi

      # Write profile (overwrite, not append — idempotent)
      cat > /etc/profile.d/go.sh << 'GOEOF'
export PATH=/usr/local/go/bin:$PATH
export GOPATH=$HOME/go
export PATH=$GOPATH/bin:$PATH
GOEOF
      chmod +x /etc/profile.d/go.sh

  # ── Node 20 + pnpm ──────────────────────────────────────────────
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! command -v node &>/dev/null; then
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      fi
      corepack enable
      corepack prepare pnpm@latest --activate

  # ── User-level Go tools ─────────────────────────────────────────
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH
      export GOPATH=$HOME/go

      # air: hot-reload for Go API server
      go install github.com/air-verse/air@latest

      # buf: protobuf toolchain
      go install github.com/bufbuild/buf/cmd/buf@latest

      # protoc plugins for Connect-RPC
      go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest

# SSH configuration
ssh:
  localPort: 0
  loadDotSSHPubKeys: true

message: |
  ==========================================================
    Lima VM "lab" is ready!
  ==========================================================

    Project mounted at: /app

    VS Code Remote SSH:
      Cmd+Shift+P -> Remote-SSH: Connect to Host -> lima-lab
      Then open /app in the remote file browser.

    Useful commands (from Mac terminal):
      limactl shell lab              # open shell
      make dev                       # start dev servers
      make test                      # run API tests
      make test-x86                  # run x86_64 Docker tests

  ==========================================================
