# =============================================================================
# Lab Platform - Docker Compose (Single Container)
#
# This deployment uses a single container that serves both the API and web UI.
# The web UI is embedded into the Go binary at build time.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#
# Access: http://localhost:8080
# =============================================================================

services:
  lab:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: lab
    privileged: true
    network_mode: host
    environment:
      - LIBVIRT_URI=${LIBVIRT_URI:-qemu:///system}
      - JWT_SECRET=${JWT_SECRET}
      - ENV=${ENV:-production}
      - STACKS_DIR=/var/lib/lab/stacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/libvirt:/var/run/libvirt
      - lab-data:/var/lib/lab
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lab-data:
