name: CI

on:
  push:
    branches:
      - main
      - "release-*"
  pull_request:
    branches:
      - main
      - "release-*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linters
        run: pnpm lint

      - name: Check formatting
        run: pnpm format --check

      - name: Check dependency versions
        run: pnpm syncpack:lint || true

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install libvirt and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvirt-dev \
            pkg-config \
            gcc \
            libc6-dev \
            qemu-system-x86 \
            libvirt-daemon-system

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install proto tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate proto code
        run: |
          cd apps/api
          make proto

      - name: Build web UI (static export)
        run: |
          cd apps/web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Verify static export
        run: |
          test -d apps/web/out
          test -f apps/web/out/index.html
          echo "✅ Web UI built successfully"

      - name: Build single binary (API + embedded web)
        env:
          CGO_ENABLED: 1
        run: |
          cd apps/api
          
          # Copy web build to embed directory
          rm -rf internal/router/web || true
          mkdir -p internal/router/web
          cp -r ../web/out/* internal/router/web/
          
          # Build Go binary with embedded web
          go build \
            -ldflags="-s -w -X main.version=ci-$(git rev-parse --short HEAD)" \
            -o lab-server \
            ./cmd/server
          
          # Verify binary
          test -f lab-server
          echo "✅ Binary built successfully"

      - name: Test binary help
        run: |
          cd apps/api
          ./lab-server --help || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-server-ci
          path: apps/api/lab-server
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd apps/web
          pnpm exec playwright install --with-deps chromium

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: lab-server-ci
          path: apps/api

      - name: Make binary executable
        run: chmod +x apps/api/lab-server

      - name: Build web for testing
        run: |
          cd apps/web
          pnpm build

      - name: Run E2E tests
        run: |
          pnpm test:e2e
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: lab:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm lab:test-${{ github.sha }} --help || true
          echo "✅ Docker image built successfully"
