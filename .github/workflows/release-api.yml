name: Release API

on:
  push:
    tags:
      - 'api-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libvirt and build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libvirt-dev \
            pkg-config \
            gcc \
            libc6-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install proto tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate proto code
        run: |
          cd apps/api
          make proto

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/api-v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          CGO_ENABLED: 1
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd apps/api
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o lab-server-linux-amd64 \
            ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-server-linux-amd64
          path: apps/api/lab-server-linux-amd64
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/api-v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lab-server-*
          merge-multiple: true
          path: ./bin

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/api-v}" >> $GITHUB_OUTPUT
          fi

      - name: Create checksums
        run: |
          cd bin
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: api-v${{ steps.version.outputs.version }}
          name: API v${{ steps.version.outputs.version }}
          body: |
            ## Lab API Server v${{ steps.version.outputs.version }}

            ### Binaries
            - `lab-server-linux-amd64` - Linux x86_64 (requires libvirt)

            ### Usage
            ```bash
            # Run with default config
            ./lab-server-linux-amd64

            # Run with custom config
            LAB_CONFIG=/path/to/config.yaml ./lab-server-linux-amd64
            ```

            ### Configuration
            See [DEPLOYMENT.md](https://github.com/${{ github.repository }}/blob/main/DEPLOYMENT.md#configuration) for configuration options.

            ### System Requirements
            - libvirt must be installed and running
            - User must be in the `libvirt` group
          files: |
            bin/*
          generate_release_notes: false
          make_latest: true
